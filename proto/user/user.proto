syntax = "proto3";

package user.v1;

option go_package = "github.com/GoAll5/protos/gen/go/user/v1;userv1";

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
}

message CreateUserRequest {
  string user_id = 1;
  string email   = 2;
  // profile can be extended later: address
  string first_name = 3;
  string last_name  = 4;
}

message CreateUserResponse {
  string user_id = 1;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  string user_id = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
  // address, etc later
}